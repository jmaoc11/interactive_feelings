<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js Scene Dev</title>
  <link rel="stylesheet" href="/scene/style.css">
</head>
<body>

  <div id="scene-container">
    <canvas id="scene-canvas"></canvas>
  </div>

  <div id="inventory-overlay">
    <div id="inventory-bar">
      <img src="/assets/Images/inventorySlots.png" id="inventory-slots" />
      <div id="slots-overlay">
        <div class="slot" data-slot="0"></div>
        <div class="slot" data-slot="1"></div>
        <div class="slot" data-slot="2"></div>
        <div class="slot" data-slot="3"></div>
        <div class="slot" data-slot="4"></div>
        <div class="slot" data-slot="5"></div>
        <div class="slot" data-slot="6"></div>
        <div class="slot" data-slot="7"></div>
        <div class="slot" data-slot="8"></div>
      </div>
    </div>
  </div>

  <div id="controls" style="display:block">
    <h2>Scene Development</h2>
    <p>Scroll Progress: <span id="progress-display">0.00</span></p>
    <input
      type="range"
      id="progress-slider"
      min="0"
      max="100"
      value="0"
      step="0.1"
    />
    <div class="button-group">
      <button id="reset-btn">Reset</button>
      <button id="animate-btn">Auto Animate</button>
    </div>
    <p style="margin-top:14px">Mallet Lag: <span id="lag-display">0.18</span></p>
    <input type="range" id="lag-slider" min="0.01" max="1" value="0.18" step="0.01" />

    <hr style="margin:14px 0;border-color:#444" />
    <h3 style="margin:0 0 8px">Slot Glow</h3>
    <p>Line Width: <span id="glow-width-display">1</span></p>
    <input type="range" id="glow-width-slider" min="0.5" max="5" value="1" step="0.1" />
<p>Bloom Strength: <span id="bloom-strength-display">0.40</span></p>
    <input type="range" id="bloom-strength-slider" min="0" max="3" value="0.6" step="0.05" />
    <p>Bloom Radius: <span id="bloom-radius-display">0.25</span></p>
    <input type="range" id="bloom-radius-slider" min="0" max="1" value="0.25" step="0.05" />
    <p>Bloom Threshold: <span id="bloom-threshold-display">0.25</span></p>
    <input type="range" id="bloom-threshold-slider" min="0" max="1" value="0.25" step="0.05" />
  </div>

<script type="module" src="/scene/scene-dev.js"></script>

</body>
</html>
